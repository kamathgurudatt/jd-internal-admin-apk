name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Find correct Maven repo for react-android:0.73.6
        run: |
          echo "=== react-android 0.73.x versions on Maven Central ==="
          curl -s "https://repo.maven.apache.org/maven2/com/facebook/react/react-android/maven-metadata.xml" \
            | grep -E "0\.73" | head -10 || echo "No 0.73.x versions on Maven Central"

          echo ""
          echo "=== react-native 0.73.x versions on Maven Central ==="
          curl -s "https://repo.maven.apache.org/maven2/com/facebook/react/react-native/maven-metadata.xml" \
            | grep -E "0\.73" | head -10 || echo "No 0.73.x versions on Maven Central"

          echo ""
          echo "=== Try Maven Central via https (follow redirects) ==="
          curl -sL -o /dev/null -w "%{http_code} %{url_effective}" \
            "https://search.maven.org/remotecontent?filepath=com/facebook/react/react-android/0.73.6/react-android-0.73.6.aar"
          echo ""

          echo ""
          echo "=== Check jitpack ==="
          curl -s -o /dev/null -w "%{http_code}" \
            "https://jitpack.io/com/facebook/react/react-android/0.73.6/react-android-0.73.6.aar"
          echo " (jitpack)"

          echo ""
          echo "=== Check if react-android exists in ~/.gradle after npm install ==="
          find ~/.gradle -name "react-android*.aar" 2>/dev/null | head -5 || echo "Not in Gradle cache"

          echo ""
          echo "=== Find ALL AARs in entire node_modules for react-native ==="
          find node_modules/react-native -name "*.aar" -o -name "*.jar" 2>/dev/null | grep -v node_modules | head -20
          ls node_modules/react-native/ | head -20
