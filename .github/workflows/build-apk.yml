name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Copy gradle-wrapper.jar from react-native template
        run: |
          mkdir -p android/gradle/wrapper
          cp node_modules/react-native/template/android/gradle/wrapper/gradle-wrapper.jar \
             android/gradle/wrapper/

      - name: Inspect local react-native Android Maven repo
        run: |
          echo "=== com.facebook.react artifacts in local Maven repo ==="
          ls node_modules/react-native/android/com/facebook/react/ 2>/dev/null || echo "No react artifacts found"
          echo ""
          echo "=== react-native artifact versions ==="
          ls node_modules/react-native/android/com/facebook/react/react-native/ 2>/dev/null || echo "react-native dir not found"
          echo ""
          echo "=== react-android artifact versions ==="
          ls node_modules/react-native/android/com/facebook/react/react-android/ 2>/dev/null || echo "react-android dir not found"
          echo ""
          echo "=== Check if BaseReactPackage is in react-android:0.73.6 AAR ==="
          AAR="node_modules/react-native/android/com/facebook/react/react-android/0.73.6/react-android-0.73.6.aar"
          if [ -f "$AAR" ]; then
            unzip -p "$AAR" classes.jar | jar tf /dev/stdin 2>/dev/null | grep BaseReactPackage || echo "(not found in classes.jar)"
          else
            echo "AAR not found at: $AAR"
          fi

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          cat > node_modules/@react-native/gradle-plugin/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "react-native-gradle-plugin"
          EOF

      - name: Patch RN plugin build.gradle.kts — remove testRuntimeOnly(serviceOf)
        run: |
          python3 << 'PYEOF'
          fname = "node_modules/@react-native/gradle-plugin/build.gradle.kts"
          with open(fname) as f:
              lines = f.readlines()
          REMOVE_IMPORTS = {
              'org.gradle.api.internal.classpath.ModuleRegistry',
              'org.gradle.configurationcache.extensions.serviceOf',
          }
          result = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if any(imp in line for imp in REMOVE_IMPORTS):
                  i += 1
                  continue
              if 'testRuntimeOnly' in line:
                  lookahead = ''.join(lines[i:i+15])
                  if 'serviceOf' in lookahead:
                      depth = line.count('(') - line.count(')')
                      i += 1
                      while i < len(lines) and depth > 0:
                          depth += lines[i].count('(') - lines[i].count(')')
                          i += 1
                      continue
              result.append(line)
              i += 1
          with open(fname, 'w') as f:
              f.writelines(result)
          print("OK" if 'serviceOf' not in ''.join(result) else "WARNING: serviceOf still present")
          PYEOF

      - name: Pre-compile @react-native/gradle-plugin
        working-directory: node_modules/@react-native/gradle-plugin
        run: |
          chmod +x gradlew
          ./gradlew jar --no-daemon 2>&1 | tail -5
          ls -lh build/libs/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
