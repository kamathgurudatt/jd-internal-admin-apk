name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Inspect autolinking config
        run: |
          echo "=== @react-native-community/cli version ==="
          cat node_modules/@react-native-community/cli/package.json 2>/dev/null | grep '"version"' | head -1
          echo ""
          echo "=== react-native config android section ==="
          node -e "
          const {loadConfig} = require('@react-native-community/cli');
          loadConfig().then(cfg => {
            const android = cfg.project && cfg.project.android;
            console.log('packageName:', android && android.packageName);
            console.log('dependencies count:', Object.keys(cfg.dependencies || {}).length);
            // Show first 3 native deps
            const deps = Object.entries(cfg.dependencies || {}).slice(0,3);
            deps.forEach(([name,info]) => {
              const a = info.platforms && info.platforms.android;
              console.log(name, '->', a && a.sourceDir);
            });
          }).catch(e => console.log('Error:', e.message));
          " 2>&1 | head -20

      - name: Copy gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          JAR=$(find node_modules -name "gradle-wrapper.jar" 2>/dev/null | head -1)
          cp "$JAR" android/gradle/wrapper/

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          python3 << 'PYEOF'
          import re
          fname = "node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          with open(fname) as f:
              content = f.read()
          patched = re.sub(
              r'\nplugins \{ id\("org\.gradle\.toolchains\.foojay-resolver-convention"\)[^\}]*\}\n',
              '\n', content)
          with open(fname, 'w') as f:
              f.write(patched)
          print("foojay removed:", "foojay" not in patched)
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK with autolinking --info
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --info 2>&1 | \
          grep -E "autolink|Autolink|native-screens|native-gesture|screens.*project|gesture.*project|includeBuild.*screen|project.*react-native" | \
          head -20
        continue-on-error: true
