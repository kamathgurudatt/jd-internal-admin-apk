name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Copy gradle-wrapper.jar from react-native template
        run: |
          mkdir -p android/gradle/wrapper
          cp node_modules/react-native/template/android/gradle/wrapper/gradle-wrapper.jar \
             android/gradle/wrapper/

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          cat > node_modules/@react-native/gradle-plugin/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "react-native-gradle-plugin"
          EOF

      # Show build.gradle.kts around line 52 to understand the serviceOf context,
      # then patch to remove ALL internal-API blocks (test tasks, KotlinCompile tasks).
      - name: Patch RN plugin build.gradle.kts
        run: |
          python3 << 'PYEOF'
          import re

          fname = "node_modules/@react-native/gradle-plugin/build.gradle.kts"
          with open(fname) as f:
              content = f.read()

          # Show lines around line 52
          lines = content.split('\n')
          for i, l in enumerate(lines[45:60], start=46):
              print(f"{i}: {l}")
          print("---")

          # Remove ALL internal Gradle API imports
          for imp in [
              r'import org\.gradle\.api\.internal\.classpath\.ModuleRegistry\n',
              r'import org\.gradle\.configurationcache\.extensions\.serviceOf\n',
              r'import org\.gradle\.api\.tasks\.testing\.logging\.TestExceptionFormat\n',
          ]:
              content = re.sub(imp, '', content)

          # Remove ALL tasks blocks that contain serviceOf (multiline, non-greedy within block)
          # Remove tasks.withType<Test>() block
          content = re.sub(
              r'\ntasks\.withType<Test>\(\)\.configureEach \{[^}]*(?:\{[^}]*\}[^}]*)*\}',
              '', content, flags=re.DOTALL)
          # Remove tasks.withType<KotlinCompile>() block
          content = re.sub(
              r'\ntasks\.withType<KotlinCompile>\(\)\.configureEach \{[^}]*(?:\{[^}]*\}[^}]*)*\}',
              '', content, flags=re.DOTALL)
          # Remove any standalone lines with serviceOf
          content = re.sub(r'.*serviceOf.*\n', '', content)

          with open(fname, 'w') as f:
              f.write(content)

          # Verify no more serviceOf
          if 'serviceOf' in content:
              print("WARNING: serviceOf still present!")
          else:
              print("Patched successfully — no serviceOf remaining")
          PYEOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with date
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            jd-admin-v1.0-$(date +%Y%m%d).apk

      - name: Delete existing 'latest' tag & release
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          [ -n "$RELEASE_ID" ] && curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JD Admin — Latest Build"
          body: |
            **JD Admin APK** — automated build from `main` branch.

            > ⚠️ `BASE_URL` = `http://172.29.137.139:8080` (intranet only).
            > Works on office Wi-Fi. For outside-network access, update `src/api/client.js`.

            ### Install
            1. Download `jd-admin-*.apk` below
            2. Copy to Android device
            3. Settings → Security → **Install unknown apps** → allow Files
            4. Tap the APK to install

            ### First launch
            - Enter **Bearer Token** (from `server.js`)
            - Set a **4-digit PIN**
          files: jd-admin-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
