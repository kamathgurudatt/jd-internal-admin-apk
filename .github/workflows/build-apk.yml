name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Generate Gradle wrapper jar
        working-directory: android
        run: gradle wrapper --gradle-version 8.6 --distribution-type all

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             jd-admin-v1.0-$(date +%Y%m%d).apk

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JD Admin — Latest Build"
          body: |
            **JD Admin APK** — automated build from `main` branch.

            ### Install
            1. Download `jd-admin-*.apk` below
            2. Transfer to Android device
            3. Enable *Install unknown apps* in Android Settings → Security
            4. Open the APK file to install

            ### First launch
            - Enter your **Bearer Token** (from server.js)
            - Set a **4-digit PIN** to secure the app
          prerelease: false
          files: jd-admin-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
