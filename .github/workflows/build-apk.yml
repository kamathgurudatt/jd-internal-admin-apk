name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Inspect react-native-gradle-plugin sub-project
        run: |
          PLUGIN="node_modules/@react-native/gradle-plugin"
          echo "=== react-native-gradle-plugin/build.gradle.kts ==="
          cat "$PLUGIN/react-native-gradle-plugin/build.gradle.kts" 2>/dev/null | head -40 || echo "not found"
          echo ""
          echo "=== Does it use serviceOf? ==="
          grep -r "serviceOf\|ModuleRegistry" "$PLUGIN/react-native-gradle-plugin/" 2>/dev/null || echo "none"
          echo ""
          echo "=== settings-plugin/build.gradle.kts ==="
          cat "$PLUGIN/settings-plugin/build.gradle.kts" 2>/dev/null | head -20 || echo "not found"
