name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --fetch-retries 5 --fetch-retry-mintimeout 10000 --fetch-retry-maxtimeout 60000

      - name: Copy gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          JAR=$(find node_modules -name "gradle-wrapper.jar" 2>/dev/null | head -1)
          cp "$JAR" android/gradle/wrapper/

      - name: Fix react-native-screens TypeSpec CT.* namespace imports
        run: |
          python3 << 'PYEOF'
          import os, re
          ROOT = "node_modules/react-native-screens"
          CODEGEN_TYPES_IMPORT = "import type {WithDefault, Float, Int32, Double, BubblingEventHandler, DirectEventHandler, UnsafeMixed} from 'react-native/Libraries/Types/CodegenTypes';"
          fixed = 0
          for rdir, dirs, files in os.walk(ROOT):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '__tests__', '.git')]
              for fname in files:
                  if not (fname.endswith('.ts') or fname.endswith('.tsx')):
                      continue
                  path = os.path.join(rdir, fname)
                  try:
                      with open(path, 'r', errors='replace') as f:
                          content = f.read()
                  except Exception:
                      continue
                  if 'import * as CT' not in content and 'CT.' not in content:
                      continue
                  new_content = re.sub(r"import \* as CT from '[^']*CodegenTypes[^']*';?", CODEGEN_TYPES_IMPORT, content)
                  new_content = re.sub(r'\bCT\.', '', new_content)
                  if new_content != content:
                      with open(path, 'w') as f:
                          f.write(new_content)
                      fixed += 1
          print(f"Total: {fixed} TypeSpec files fixed")
          PYEOF

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          python3 << 'PYEOF'
          import re
          fname = "node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          with open(fname) as f:
              content = f.read()
          patched = re.sub(r'\nplugins \{ id\("org\.gradle\.toolchains\.foojay-resolver-convention"\)[^\}]*\}\n', '\n', content)
          with open(fname, 'w') as f:
              f.write(patched)
          print("foojay removed:", "foojay" not in patched)
          PYEOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --install "ndk;26.1.10909125" 2>/dev/null || true
          ls $ANDROID_HOME/ndk/ 2>/dev/null | head -3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # Compile safe-area-context first to get the generated delegate class
      - name: Run codegen for safe-area-context + show generated delegate
        working-directory: android
        run: |
          ./gradlew :react-native-safe-area-context:generateCodegenArtifactsFromSchema --no-daemon 2>&1 | tail -5 || true
          echo "=== Generated delegate class ==="
          find node_modules/react-native-safe-area-context/android/build -name "RNCSafeAreaProviderManagerDelegate*" 2>/dev/null | head -3
          find node_modules/react-native-safe-area-context/android/build -name "RNCSafeAreaProviderManagerDelegate*.java" -exec head -10 {} \; 2>/dev/null
