name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Check which React Native versions are on Maven Central
        run: |
          echo "=== ALL react-android versions on Maven Central ==="
          curl -s "https://repo.maven.apache.org/maven2/com/facebook/react/react-android/maven-metadata.xml" \
            | grep "<version>" | head -30
          echo ""
          echo "=== react-android-0.76.9 check ==="
          curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.maven.apache.org/maven2/com/facebook/react/react-android/0.76.9/react-android-0.76.9.pom"
          echo " (0.76.9 pom)"
