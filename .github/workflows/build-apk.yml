name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Inspect RN 0.76 gradle-plugin
        run: |
          echo "=== settings.gradle.kts ==="
          cat node_modules/@react-native/gradle-plugin/settings.gradle.kts 2>/dev/null || echo "not found"
          echo ""
          echo "=== build.gradle.kts (first 30 lines) ==="
          head -30 node_modules/@react-native/gradle-plugin/build.gradle.kts 2>/dev/null || echo "not found"
          echo ""
          echo "=== gradle-wrapper.jar locations ==="
          find node_modules -name "gradle-wrapper.jar" 2>/dev/null | head -5
