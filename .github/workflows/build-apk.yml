name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate PNG app icons from jd_admin_icon.svg
        run: |
          sudo apt-get install -y librsvg2-bin 2>/dev/null || true
          SVG="jd_admin_icon.svg"
          if [ -f "$SVG" ]; then
            for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
              density="${entry%%:*}"
              size="${entry##*:}"
              outdir="android/app/src/main/res/mipmap-${density}"
              mkdir -p "$outdir"
              rsvg-convert -w "$size" -h "$size" "$SVG" -o "${outdir}/ic_launcher.png"
              rsvg-convert -w "$size" -h "$size" "$SVG" -o "${outdir}/ic_launcher_round.png"
              echo "Generated ${density}: ${size}x${size}"
            done
          else
            echo "jd_admin_icon.svg not found — using existing mipmap resources"
          fi

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Delete React Native source files (no longer needed)
        run: |
          rm -f android/app/src/main/java/com/jdadminapp/MainApplication.kt
          rm -f android/app/src/main/java/com/jdadminapp/CrashHandler.kt
          rm -f android/app/src/main/java/com/jdadminapp/CrashReportActivity.kt

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK with date
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            jd-admin-v2.0-$(date +%Y%m%d).apk

      - name: Publish GitHub Release (direct API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          APK=$(ls jd-admin-v2.0-*.apk | head -1)
          echo "APK file: $APK ($(du -sh $APK | cut -f1))"

          # Delete old release + tag
          OLD_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/latest" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)
          [ -n "$OLD_ID" ] && curl -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$OLD_ID" || true
          git push origin :refs/tags/latest 2>/dev/null || true
          sleep 2

          # Create release
          BODY=$(printf '%s' '{"tag_name":"latest","target_commitish":"main","name":"JD Admin v2.0 — Latest Build","draft":false,"prerelease":false,"body":"**JD Admin v2.0** — WebView build, works on Android 15 & 16.\n\nDownload the .apk from **Assets** below. Uninstall old version first.\n\n### First launch\n1. Enter server URL\n2. Enter bearer token\n3. Set 4-digit PIN"}')
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/releases" \
            -d "$BODY")
          echo "Create response: $RESPONSE" | head -c 500

          UPLOAD_URL=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['upload_url'].replace('{?name,label}',''))")
          echo "Upload URL: $UPLOAD_URL"

          # Upload APK
          UPLOAD_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "${UPLOAD_URL}?name=${APK}&label=${APK}" \
            --data-binary @"$APK")
          echo "Upload response: $(echo $UPLOAD_RESP | head -c 300)"
          echo "Done: $(echo $UPLOAD_RESP | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"browser_download_url\",\"no URL\"))')"
