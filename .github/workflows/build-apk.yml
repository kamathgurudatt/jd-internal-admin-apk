name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # no cache: — no lock file in repo

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper jar
        working-directory: android
        run: gradle wrapper --gradle-version 8.6 --distribution-type all

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Rename APK with date
        run: |
          DATE=$(date +%Y%m%d)
          cp android/app/build/outputs/apk/debug/app-debug.apk jd-admin-v1.0-${DATE}.apk
          echo "APK_NAME=jd-admin-v1.0-${DATE}.apk" >> $GITHUB_ENV

      - name: Delete existing 'latest' release (if any)
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi
          # Delete the tag too
          git push origin :refs/tags/latest || true

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JD Admin — Latest Build"
          body: |
            **JD Admin APK** — automated build from `main` branch.

            > ⚠️ Current `BASE_URL` is set to the **intranet IP** `http://172.29.137.139:8080`.
            > This APK only works on the office Wi-Fi. Update `src/api/client.js` with your
            > public tunnel URL (Cloudflare Tunnel / ngrok) for outside-network access.

            ### Install
            1. Download `jd-admin-*.apk` below
            2. Transfer to your Android device (USB / Drive / WhatsApp to self)
            3. On the device: Settings → Security → **Install unknown apps** → enable for Files
            4. Open the APK file to install

            ### First launch
            1. Enter your **Bearer Token** (from `server.js`)
            2. Set a **4-digit PIN** to lock the app
            3. Optionally enable biometric unlock
          prerelease: false
          files: ${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
