name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --fetch-retries 5 --fetch-retry-mintimeout 10000 --fetch-retry-maxtimeout 60000

      - name: Show safe-area-context C++ code around StyleLength
        run: |
          echo "=== RNCSafeAreaViewShadowNode.cpp lines 10-35 ==="
          sed -n '10,35p' node_modules/react-native-safe-area-context/common/cpp/react/renderer/components/safeareacontext/RNCSafeAreaViewShadowNode.cpp 2>/dev/null || echo "not found"
