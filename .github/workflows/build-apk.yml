name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Copy gradle-wrapper.jar from react-native template
        run: |
          mkdir -p android/gradle/wrapper
          cp node_modules/react-native/template/android/gradle/wrapper/gradle-wrapper.jar \
             android/gradle/wrapper/

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          cat > node_modules/@react-native/gradle-plugin/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "react-native-gradle-plugin"
          EOF

      - name: Patch RN plugin build.gradle.kts — remove testRuntimeOnly(serviceOf)
        run: |
          python3 << 'PYEOF'
          fname = "node_modules/@react-native/gradle-plugin/build.gradle.kts"
          with open(fname) as f:
              lines = f.readlines()
          REMOVE_IMPORTS = {
              'org.gradle.api.internal.classpath.ModuleRegistry',
              'org.gradle.configurationcache.extensions.serviceOf',
          }
          result = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if any(imp in line for imp in REMOVE_IMPORTS):
                  i += 1
                  continue
              if 'testRuntimeOnly' in line:
                  lookahead = ''.join(lines[i:i+15])
                  if 'serviceOf' in lookahead:
                      depth = line.count('(') - line.count(')')
                      i += 1
                      while i < len(lines) and depth > 0:
                          depth += lines[i].count('(') - lines[i].count(')')
                          i += 1
                      continue
              result.append(line)
              i += 1
          with open(fname, 'w') as f:
              f.writelines(result)
          print("OK" if 'serviceOf' not in ''.join(result) else "WARNING: serviceOf still present")
          PYEOF

      - name: Show react-native-screens dependencies block
        run: |
          echo "=== Full react-native-screens/android/build.gradle ==="
          cat node_modules/react-native-screens/android/build.gradle | grep -A30 "^dependencies {"
          echo "=== Does file have react-android? ==="
          grep "react-android\|react-native\|react_native" node_modules/react-native-screens/android/build.gradle || echo "(none)"

      - name: Pre-compile @react-native/gradle-plugin
        working-directory: node_modules/@react-native/gradle-plugin
        run: |
          chmod +x gradlew
          ./gradlew jar --no-daemon 2>&1 | tail -5
          ls -lh build/libs/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Check react-native-screens compile classpath
        working-directory: android
        run: |
          ./gradlew :react-native-screens:dependencies --configuration debugCompileClasspath \
            --no-daemon 2>&1 | grep -E "react-android|react-native|com.facebook" | head -20 || true

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
