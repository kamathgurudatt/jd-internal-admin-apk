name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Copy gradle-wrapper.jar from react-native template
        run: |
          mkdir -p android/gradle/wrapper
          cp node_modules/react-native/template/android/gradle/wrapper/gradle-wrapper.jar \
             android/gradle/wrapper/

      - name: Inject Gradle init script
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/plugin-repos.gradle << 'INITEOF'
          beforeSettings { settings ->
              settings.pluginManagement {
                  repositories {
                      gradlePluginPortal()
                      google()
                      mavenCentral()
                  }
              }
          }
          INITEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK (--info filtered)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --info 2>&1 | \
          grep -E "includeBuild|IncludedBuild|com.facebook.react|kotlin.jvm|Plugin|plugin|FAILURE|Error|error|Could not|Caused by|serviceOf|version catalog|libs\\.plugins" | \
          head -80
          echo "exit: $?"
        continue-on-error: true

      - name: Raw FAILURE block
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
