name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Find react-android AAR anywhere in node_modules
        run: |
          echo "=== Looking for react-android AARs ==="
          find node_modules/react-native -name "*.aar" 2>/dev/null | head -10
          echo ""
          echo "=== node_modules/react-native/android/ (top level) ==="
          ls -la node_modules/react-native/android/ 2>/dev/null | head -20
          echo ""
          echo "=== Maven metadata for react-android on Maven Central ==="
          curl -s "https://repo.maven.apache.org/maven2/com/facebook/react/react-android/maven-metadata.xml" | grep "<version>" | tail -5 || echo "Not found on Maven Central"
          echo ""
          echo "=== Check Sonatype Central ==="
          curl -s -o /dev/null -w "%{http_code}" "https://search.maven.org/remotecontent?filepath=com/facebook/react/react-android/0.73.6/react-android-0.73.6.aar"
          echo " (Sonatype HTTP status)"
          echo ""
          echo "=== Check S01 Sonatype ==="
          curl -s -o /dev/null -w "%{http_code}" "https://s01.oss.sonatype.org/service/local/repositories/releases/content/com/facebook/react/react-android/0.73.6/react-android-0.73.6.aar"
          echo " (S01 Sonatype HTTP status)"
