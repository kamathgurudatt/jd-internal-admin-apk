name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Copy gradle-wrapper.jar from react-native template
        run: |
          mkdir -p android/gradle/wrapper
          cp node_modules/react-native/template/android/gradle/wrapper/gradle-wrapper.jar \
             android/gradle/wrapper/

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          cat > node_modules/@react-native/gradle-plugin/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "react-native-gradle-plugin"
          EOF

      - name: Patch RN plugin build.gradle.kts — remove testRuntimeOnly(serviceOf)
        run: |
          python3 << 'PYEOF'
          fname = "node_modules/@react-native/gradle-plugin/build.gradle.kts"
          with open(fname) as f:
              lines = f.readlines()
          REMOVE_IMPORTS = {
              'org.gradle.api.internal.classpath.ModuleRegistry',
              'org.gradle.configurationcache.extensions.serviceOf',
          }
          result = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if any(imp in line for imp in REMOVE_IMPORTS):
                  i += 1
                  continue
              if 'testRuntimeOnly' in line:
                  lookahead = ''.join(lines[i:i+15])
                  if 'serviceOf' in lookahead:
                      depth = line.count('(') - line.count(')')
                      i += 1
                      while i < len(lines) and depth > 0:
                          depth += lines[i].count('(') - lines[i].count(')')
                          i += 1
                      continue
              result.append(line)
              i += 1
          with open(fname, 'w') as f:
              f.writelines(result)
          print("OK" if 'serviceOf' not in ''.join(result) else "WARNING: serviceOf still present")
          PYEOF

      - name: Show native module build.gradle files (diagnostic)
        run: |
          echo "=== react-native-screens/android/build.gradle ==="
          head -60 node_modules/react-native-screens/android/build.gradle 2>/dev/null || echo "not found"
          echo "=== react-native-gesture-handler/android/build.gradle (first 40 lines) ==="
          head -40 node_modules/react-native-gesture-handler/android/build.gradle 2>/dev/null || echo "not found"

      # Inject react-android:0.73.6 into native modules that need BaseReactPackage.
      # These modules use `apply plugin: "com.facebook.react"` which is supposed to
      # inject the dependency, but our custom setup doesn't propagate it correctly.
      - name: Inject react-android dependency into failing native modules
        run: |
          for MODULE in react-native-screens react-native-gesture-handler; do
            BUILD="node_modules/$MODULE/android/build.gradle"
            if [ -f "$BUILD" ] && ! grep -q "react-android" "$BUILD"; then
              # Add at start of dependencies block
              sed -i '/^dependencies {/a\    implementation "com.facebook.react:react-android:0.73.6"' "$BUILD"
              echo "Injected into $MODULE"
              head -5 "$BUILD"
            elif [ -f "$BUILD" ]; then
              echo "$MODULE already has react-android"
            fi
          done

      - name: Pre-compile @react-native/gradle-plugin
        working-directory: node_modules/@react-native/gradle-plugin
        run: |
          chmod +x gradlew
          ./gradlew jar --no-daemon 2>&1 | tail -5
          ls -lh build/libs/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with date
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            jd-admin-v1.0-$(date +%Y%m%d).apk

      - name: Delete existing 'latest' tag & release
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          [ -n "$RELEASE_ID" ] && curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JD Admin — Latest Build"
          body: |
            **JD Admin APK** — automated build from `main` branch.

            > ⚠️ `BASE_URL` = `http://172.29.137.139:8080` (intranet only).
            > Works on office Wi-Fi. For outside-network access, update `src/api/client.js`.

            ### Install
            1. Download `jd-admin-*.apk` below
            2. Copy to Android device
            3. Settings → Security → **Install unknown apps** → allow Files
            4. Tap the APK to install

            ### First launch
            - Enter **Bearer Token** (from `server.js`)
            - Set a **4-digit PIN**
          files: jd-admin-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
