name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Debug react-native config output
        run: |
          echo "=== @react-native-community/cli version ==="
          cat node_modules/@react-native-community/cli/package.json 2>/dev/null | grep '"version"' | head -1 || echo "CLI not found"
          echo ""
          echo "=== react-native config output (project.android section) ==="
          node -e "
          const {loadConfig} = require('@react-native-community/cli');
          loadConfig().then(cfg => {
            const android = cfg.project && cfg.project.android;
            console.log('android config:', JSON.stringify(android, null, 2));
          }).catch(e => console.log('Error:', e.message));
          " 2>&1 | head -30 || echo "Error running config"
