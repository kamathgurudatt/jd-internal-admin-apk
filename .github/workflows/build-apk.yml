name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate PNG app icons from jd_admin_icon.svg
        run: |
          sudo apt-get install -y librsvg2-bin 2>/dev/null || true
          SVG="jd_admin_icon.svg"
          if [ -f "$SVG" ]; then
            for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
              density="${entry%%:*}"
              size="${entry##*:}"
              outdir="android/app/src/main/res/mipmap-${density}"
              mkdir -p "$outdir"
              rsvg-convert -w "$size" -h "$size" "$SVG" -o "${outdir}/ic_launcher.png"
              rsvg-convert -w "$size" -h "$size" "$SVG" -o "${outdir}/ic_launcher_round.png"
              echo "Generated ${density}: ${size}x${size}"
            done
          else
            echo "jd_admin_icon.svg not found — using existing mipmap resources"
          fi

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Delete React Native source files (no longer needed)
        run: |
          rm -f android/app/src/main/java/com/jdadminapp/MainApplication.kt
          rm -f android/app/src/main/java/com/jdadminapp/CrashHandler.kt
          rm -f android/app/src/main/java/com/jdadminapp/CrashReportActivity.kt

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK with date
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            jd-admin-v2.0-$(date +%Y%m%d).apk

      - name: Delete existing 'latest' tag & release
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          [ -n "$RELEASE_ID" ] && curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JD Admin v2.0 — Latest Build"
          draft: false
          prerelease: false
          body: |
            **JD Admin v2.0** — WebView build (no React Native, no native library issues).

            Works on Android 15, 16 and all modern devices.

            > Download the `.apk` file from **Assets** below.
            > Uninstall any previous version first.

            ### First launch setup
            1. Enter server URL (default: `http://172.29.137.139:8080`)
            2. Enter bearer token
            3. Set a 4-digit PIN
          files: jd-admin-v2.0-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
