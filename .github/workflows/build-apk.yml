name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --fetch-retries 5 --fetch-retry-mintimeout 10000 --fetch-retry-maxtimeout 60000

      - name: Find exact TypeSpec definition for accessibilityContainerViewIsModal
        run: |
          echo "=== Files containing the prop ==="
          grep -r "accessibilityContainerViewIsModal" node_modules/react-native-screens \
            --include="*.ts" --include="*.tsx" -l 2>/dev/null | head -10
          echo ""
          echo "=== Context lines ==="
          grep -r "accessibilityContainerViewIsModal" node_modules/react-native-screens \
            --include="*.ts" --include="*.tsx" -B1 -A1 2>/dev/null | head -30
