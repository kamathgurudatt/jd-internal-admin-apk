name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Copy gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          JAR=$(find node_modules -name "gradle-wrapper.jar" 2>/dev/null | head -1)
          cp "$JAR" android/gradle/wrapper/
          echo "Copied from: $JAR"

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          python3 << 'PYEOF'
          import re
          fname = "node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          with open(fname) as f:
              content = f.read()
          patched = re.sub(
              r'\nplugins \{ id\("org\.gradle\.toolchains\.foojay-resolver-convention"\)[^\}]*\}\n',
              '\n', content)
          with open(fname, 'w') as f:
              f.write(patched)
          print("foojay removed:", "foojay" not in patched)
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK with --info (filter react-native-gradle-plugin)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --info 2>&1 | \
          grep -E "react-native-gradle-plugin|:react-native|rootproject|com.facebook.react|Plugin.*not found|Could not|error:|Error:|FAIL|Script compilation" | \
          grep -v "Deprec\|^\[36" | head -40
          echo "Exit code: $?"
        continue-on-error: true

      - name: Raw FAILURE
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -30
