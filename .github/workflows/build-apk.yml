name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --fetch-retries 5 --fetch-retry-mintimeout 10000 --fetch-retry-maxtimeout 60000

      - name: Copy gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          JAR=$(find node_modules -name "gradle-wrapper.jar" 2>/dev/null | head -1)
          cp "$JAR" android/gradle/wrapper/
          echo "Copied from: $JAR"

      # react-native-screens TypeSpec: CT.* namespace types fail in @react-native/codegen parser
      - name: Fix react-native-screens TypeSpec CT.* namespace imports
        run: |
          python3 << 'PYEOF'
          import os, re
          ROOT = "node_modules/react-native-screens"
          CODEGEN_TYPES_IMPORT = "import type {WithDefault, Float, Int32, Double, BubblingEventHandler, DirectEventHandler, UnsafeMixed} from 'react-native/Libraries/Types/CodegenTypes';"
          fixed = 0
          for rdir, dirs, files in os.walk(ROOT):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '__tests__', '.git')]
              for fname in files:
                  if not (fname.endswith('.ts') or fname.endswith('.tsx')):
                      continue
                  path = os.path.join(rdir, fname)
                  try:
                      with open(path, 'r', errors='replace') as f:
                          content = f.read()
                  except Exception:
                      continue
                  if 'import * as CT' not in content and 'CT.' not in content:
                      continue
                  new_content = re.sub(r"import \* as CT from '[^']*CodegenTypes[^']*';?", CODEGEN_TYPES_IMPORT, content)
                  new_content = re.sub(r'\bCT\.', '', new_content)
                  if new_content != content:
                      with open(path, 'w') as f:
                          f.write(new_content)
                      fixed += 1
                      print(f"Fixed: {path}")
          print(f"Total: {fixed} files fixed")
          PYEOF

      # Kotlin 1.9 can't infer generic type U in RNCSafeAreaProviderManagerDelegate(this).
      # Fix: declare mDelegate with explicit ViewManagerDelegate<SafeAreaProvider> type
      # to satisfy the override constraint, letting Kotlin infer the delegate's type param.
      - name: Fix safe-area-context SafeAreaProviderManager.kt type inference
        run: |
          FILE="node_modules/react-native-safe-area-context/android/src/main/java/com/th3rdwave/safeareacontext/SafeAreaProviderManager.kt"
          if [ -f "$FILE" ]; then
            python3 << 'PYEOF'
          import re
          fname = "node_modules/react-native-safe-area-context/android/src/main/java/com/th3rdwave/safeareacontext/SafeAreaProviderManager.kt"
          with open(fname) as f:
              content = f.read()

          # Fix: both variable type AND constructor type parameter must be explicit.
          # Kotlin 1.9 can't infer U from 'this' when the delegate has Java generic bounds.
          new_content = content.replace(
              'private val mDelegate = RNCSafeAreaProviderManagerDelegate(this)',
              'private val mDelegate: com.facebook.react.uimanager.ViewManagerDelegate<SafeAreaProvider> = RNCSafeAreaProviderManagerDelegate<SafeAreaProviderManager>(this)'
          )
          # Fix: explicit return type matching the base class override contract
          new_content = new_content.replace(
              'override fun getDelegate() = mDelegate',
              'override fun getDelegate(): com.facebook.react.uimanager.ViewManagerDelegate<SafeAreaProvider> = mDelegate'
          )

          with open(fname, 'w') as f:
              f.write(new_content)
          print("Patched")
          PYEOF
            sed -n '12,20p' "$FILE"
          fi

      - name: Patch RN plugin settings.gradle.kts — remove foojay
        run: |
          python3 << 'PYEOF'
          import re
          fname = "node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          with open(fname) as f:
              content = f.read()
          patched = re.sub(r'\nplugins \{ id\("org\.gradle\.toolchains\.foojay-resolver-convention"\)[^\}]*\}\n', '\n', content)
          with open(fname, 'w') as f:
              f.write(patched)
          print("foojay removed:", "foojay" not in patched)
          PYEOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --install "ndk;26.1.10909125" 2>/dev/null || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --install "ndk;26.1.10909125" || true
          ls $ANDROID_HOME/ndk/ 2>/dev/null | head -3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with date
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            jd-admin-v1.0-$(date +%Y%m%d).apk

      - name: Delete existing 'latest' tag & release
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          [ -n "$RELEASE_ID" ] && curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JD Admin — Latest Build"
          body: |
            **JD Admin APK** — automated build from `main` branch.

            > ⚠️ `BASE_URL` = `http://172.29.137.139:8080` (intranet only).
            > Works on office Wi-Fi. For outside-network access, update `src/api/client.js`.

            ### Install
            1. Download `jd-admin-*.apk` below
            2. Copy to Android device
            3. Settings → Security → **Install unknown apps** → allow Files
            4. Tap the APK to install

            ### First launch
            - Enter **Bearer Token** (from `server.js`)
            - Set a **4-digit PIN**
          files: jd-admin-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
