name: Build & Release APK

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --fetch-retries 5 --fetch-retry-mintimeout 10000 --fetch-retry-maxtimeout 60000

      - name: Show SafeAreaProviderManager.kt line 14 context
        run: |
          echo "=== SafeAreaProviderManager.kt (lines 10-20) ==="
          sed -n '10,20p' node_modules/react-native-safe-area-context/android/src/main/java/com/th3rdwave/safeareacontext/SafeAreaProviderManager.kt 2>/dev/null || echo "file not found"
