pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
plugins {
    id("com.facebook.react.settings")
}
// NOTE: autolinkLibrariesFromCommand() removed for diagnostic build
// It finds native modules in node_modules and generates CMake references
// that fail because the modules aren't included as subprojects.
rootProject.name = 'JDAdminApp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
