buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion    = 26
        compileSdkVersion = 36
        targetSdkVersion  = 36
        ndkVersion        = "26.1.10909125"
        kotlinVersion     = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

// plugins{} syntax (not apply plugin:) is required for composite-build plugins
// contributed via pluginManagement.includeBuild
plugins {
    id("com.facebook.react.rootproject")
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "$rootDir/../node_modules/react-native/android" }
    }

    // Remap com.facebook.react:react-native:+ → react-android:0.79.7
    // Native modules still declare the old artifact name.
    configurations.configureEach {
        resolutionStrategy.dependencySubstitution {
            substitute module("com.facebook.react:react-native") \
                using module("com.facebook.react:react-android:0.79.7") \
                because "react-native renamed to react-android in RN 0.71+"
        }
        resolutionStrategy.eachDependency { DependencyResolveDetails d ->
            if (d.requested.group == "com.facebook.react" && d.requested.name != "react-native") {
                d.useVersion "0.79.7"
            }
        }
    }
}
