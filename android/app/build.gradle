apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

android {
    ndkVersion        rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk        rootProject.ext.compileSdkVersion
    namespace         "com.jdadminapp"

    defaultConfig {
        applicationId "com.jdadminapp"
        minSdk        rootProject.ext.minSdkVersion
        targetSdk     rootProject.ext.targetSdkVersion
        versionCode   1
        versionName   "1.0.0"
        // arm64-v8a covers 99%+ of Android phones since 2015
        // Removing x86/x86_64 (emulators only) cuts APK from ~135MB to ~45MB
        ndk { abiFilters "arm64-v8a" }
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig    signingConfigs.debug
            minifyEnabled    false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Core React Native (from Maven Central — 0.79.7 is confirmed published)
    implementation("com.facebook.react:react-android:0.79.7")
    implementation("com.facebook.react:hermes-android:0.79.7")

    // Native modules (included as local projects from node_modules)
    implementation project(':react-native-screens')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-encrypted-storage')
    // react-native-biometrics removed — crashes on devices without biometric hardware
}

// In React Native 0.76, autolinking is handled by the com.facebook.react plugin
// via autolinkLibrariesFromCommand() in settings.gradle — no manual native_modules.gradle needed.
