apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

react {
    // In RN 0.79, CLI is bundled inside react-native package (not @react-native-community/cli)
    cliFile = file("../../node_modules/react-native/cli.js")
    nodeExecutableAndArgs = ["node"]
}

android {
    ndkVersion        rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk        rootProject.ext.compileSdkVersion
    namespace         "com.jdadminapp"

    defaultConfig {
        applicationId "com.jdadminapp"
        minSdk        rootProject.ext.minSdkVersion
        targetSdk     rootProject.ext.targetSdkVersion
        versionCode   1
        versionName   "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig    signingConfigs.debug
            minifyEnabled    false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Direct version — react-native-bom not published for 0.79.x
    implementation("com.facebook.react:react-android:0.79.7")
    implementation("com.facebook.react:hermes-android:0.79.7")
}

// In React Native 0.76, autolinking is handled by the com.facebook.react plugin
// via autolinkLibrariesFromCommand() in settings.gradle — no manual native_modules.gradle needed.
