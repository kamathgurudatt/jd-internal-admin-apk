apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

android {
    ndkVersion        rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk        rootProject.ext.compileSdkVersion
    namespace         "com.jdadminapp"

    defaultConfig {
        applicationId "com.jdadminapp"
        minSdk        rootProject.ext.minSdkVersion
        targetSdk     rootProject.ext.targetSdkVersion
        versionCode   1
        versionName   "1.0.0"
        // abiFilters removed — build for all ABIs to prevent silent ABI mismatch crashes
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig    signingConfigs.debug
            minifyEnabled    false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // Core React Native only — DIAGNOSTIC BUILD (all native modules removed)
    implementation("com.facebook.react:react-android:0.79.7")
    implementation("com.facebook.react:hermes-android:0.79.7")
}
